name: publish

# Build the sdist + wheel and publish to PyPI via OIDC Trusted Publishing
# (no API token stored in the repo). Fires when a GitHub Release is published;
# also runnable manually from the Actions tab.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment configured as the Trusted Publisher on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/structuremappingmemory
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
